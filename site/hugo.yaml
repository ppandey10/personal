baseurl: "https://ppandey10.github.io/personal/"  # please update this to your actual URL
languageCode: "en-us"
title: "Hi, I am Prasoon!"
module:
  mounts:
    - source: ../layouts
      target: layouts
    - source: ../static
      target: static
    - source: ../archetypes
      target: archetypes
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["_cache$"]
footnotereturnlinkcontents: "↩"

permalinks:
  blogs: "/blogs/:day/:month/:year/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    - name: CV
      url: "cv/"
      weight: 2
    - name: Research
      url: "research/"
      weight: 3
    - name: Blogs
      url: "blogs/"
      weight: 4

params:
  description: "Personal website of Prasoon Pandey."
  footer: "&copy; [Prasoon Pandey](https://ppandey10.github.io/personal/) 2025 -- {Year} | [Github](https://github.com/ppandey10) | [Twitter](https://x.com/panprasoon)"

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
  goldmark:
    parser:
      wrapStandAloneImageWithinParagraph: false
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
          - - $
            - $
